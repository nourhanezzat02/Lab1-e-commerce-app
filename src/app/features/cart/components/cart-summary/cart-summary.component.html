<div class="summary">
  <h3 class="summary__title">Order Summary</h3>

  <div class="summary__row">
    <span>Subtotal ({{ itemCount }} items)</span>
    <span>${{ totalBeforeDiscount.toFixed(2) }}</span>
  </div>
  <div class="summary__row summary__row--green">
    <span>Discount</span>
    <span>−${{ totalSavings.toFixed(2) }}</span>
  </div>

  <div class="summary__divider"></div>

  <div class="summary__row summary__row--total">
    <span>Total</span>
    <span>${{ totalAfterDiscount.toFixed(2) }}</span>
  </div>
  <div class="summary__row summary__row--muted">
    <span>Original price</span>
    <span class="strikethrough">${{ totalBeforeDiscount.toFixed(2) }}</span>
  </div>

  <div class="summary__savings">
    You save ${{ totalSavings.toFixed(2) }} on this order
  </div>

  <button class="summary__btn" (click)="onCheckout()">Checkout</button>
  <button class="summary__btn summary__btn--clear" (click)="onClearCart()">Clear Cart</button>
</div>
